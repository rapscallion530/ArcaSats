{% extends "base.html" %}
{% block title %}Unlock · ArcaSats{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto px-5 py-20">
  <h1 class="text-2xl text-heading mb-4">Unlock ArcaSats</h1>
  {% if error %}<div class="mb-3 text-sm text-loss">{{ error }}</div>{% endif %}
  <form method="post" action="/login" class="space-y-4 card bg-surface border border-line rounded-card p-6">
    <label class="block text-sm">
      <span class="text-muted">Password</span>
      <input name="password" type="password" required autofocus
             class="mt-1 w-full rounded-[8px] border border-line bg-inputbg px-3 py-2 text-ink focus:outline-none focus:border-accent">
    </label>
    <button type="submit" class="w-full px-4 py-2 rounded-[8px] bg-btnbg text-btnink text-sm font-medium hover:bg-btnbghover">
      Unlock
    </button>
  </form>
</div>
{% endblock %}
